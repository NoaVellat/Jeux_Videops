name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Install de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Va dans le dossier du jeu
        run: cd js13k-2021-fd4b9e6e1954b8850125c0a7a0219db0607bf37e

      - name: Installe les dépendances
        run: npm install
        working-directory: js13k-2021-fd4b9e6e1954b8850125c0a7a0219db0607bf37e

      - name: Run test
        run: npm test
        working-directory: js13k-2021-fd4b9e6e1954b8850125c0a7a0219db0607bf37e