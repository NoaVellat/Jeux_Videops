name: Déploiement sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Déployer la plateforme
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4
      
      - name: 🔧 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 📦 Installer les dépendances de Space_Invader pour le build
        working-directory: ./Games/Space_Invader
        run: npm ci || npm install
      
      - name: 🏗️ Builder Space_Invader
        working-directory: ./Games/Space_Invader
        run: npm run build
      
      - name: 📂 Préparer les fichiers pour le déploiement
        run: |
          # Créer le dossier de déploiement
          mkdir -p deploy
          
          # Copier la page d'accueil
          cp index.html deploy/
          
          # Copier Two_Ships
          cp -r Games/Two_Ships_Passing_The_Night deploy/Two_Ships
          
          # Copier Space_Invader (build généré)
          cp -r Games/Space_Invader/build deploy/Space_Invader
          
          # Si le build n'existe pas, copier le dossier source
          if [ ! -d "deploy/Space_Invader" ]; then
            cp -r Games/Space_Invader deploy/Space_Invader
          fi
          
          # Créer un fichier .nojekyll pour éviter les problèmes
          touch deploy/.nojekyll
          
          # Afficher la structure pour vérifier
          ls -la deploy/
      
      - name: 📤 Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '🚀 Déploiement automatique'
      
      - name: ✅ Succès
        if: success()
        run: echo "✅ Déploiement réussi ! Disponible sur : https://noavellat.github.io/Jeux_Videops/"
      
      - name: ❌ Échec
        if: failure()
        run: echo "::error::❌ Le déploiement a échoué"
