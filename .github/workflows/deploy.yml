name: Déploiement sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: 🚀 Déployer la plateforme
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4
      
      - name: 🔧 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 🏗️ Build Space_Invader (TypeScript → JavaScript)
        working-directory: ./Games/Space_Invader
        run: |
          npm install
          npm run build
          echo "✅ Build terminé"
          ls -la build/
      
      - name: 📂 Préparer les fichiers pour le déploiement
        run: |
          # Créer le dossier de déploiement
          rm -rf ./deploy
          mkdir -p ./deploy
          
          # Copier la page d'accueil
          cp index.html ./deploy/
          
          # Copier Two_Ships (fichiers source, pas de build nécessaire)
          cp -r Games/Two_Ships_Passing_The_Night ./deploy/Two_Ships
          
          # Copier Space_Invader : UNIQUEMENT le contenu du build/
          mkdir -p ./deploy/Space_Invader
          cp -r Games/Space_Invader/build/* ./deploy/Space_Invader/
          
          # Créer un fichier .nojekyll
          touch ./deploy/.nojekyll
          
          echo "📁 Structure du déploiement :"
          ls -la ./deploy/
          echo ""
          echo "📁 Contenu de Space_Invader :"
          ls -la ./deploy/Space_Invader/
      
      - name: 📤 Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '🚀 Déploiement automatique avec build Space_Invader'
          publish_branch: gh-pages
          force_orphan: true
