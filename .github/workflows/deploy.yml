name: Déploiement sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: 🚀 Déployer la plateforme
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4
      
      - name: 📂 Préparer les fichiers pour le déploiement
        run: |
          # Créer le dossier de déploiement
          mkdir -p deploy
          
          # Copier la page d'accueil
          cp index.html deploy/
          
          # Copier Two_Ships
          cp -r Games/Two_Ships_Passing_The_Night deploy/Two_Ships
          
          # Copier Space_Invader
          cp -r Games/Space_Invader deploy/Space_Invader
          
          # Créer un fichier .nojekyll
          touch deploy/.nojekyll
          
          echo "📁 Structure du déploiement :"
          ls -la deploy/
      
      - name: 📤 Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '🚀 Déploiement automatique'
          publish_branch: gh-pages
