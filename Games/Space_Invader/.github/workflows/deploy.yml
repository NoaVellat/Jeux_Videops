name: Déploiement sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build Space_Invader
        working-directory: ./Games/Space_Invader
        run: |
          npm install
          npm run build
          echo "✅ Build terminé"
          ls -la build/
      
      - name: Prepare deployment files
        run: |
          rm -rf ./_site
          mkdir -p ./_site
          
          # Page d'accueil
          cp index.html ./_site/
          
          # Two Ships
          cp -r Games/Two_Ships_Passing_The_Night ./_site/Two_Ships
          
          # Space_Invader : copier UNIQUEMENT le contenu du build/
          mkdir -p ./_site/Space_Invader
          cp -r Games/Space_Invader/build/* ./_site/Space_Invader/
          
          touch ./_site/.nojekyll
          echo "📁 Contenu final de Space_Invader :"
          ls -la ./_site/Space_Invader/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
